name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'scripts/**'
      - 'references/**'
      - 'skills/**'
      - 'docs/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'LICENSE'
      - '.gitignore'
      - '.repo-health.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'scripts/**'
      - 'references/**'
      - 'skills/**'
      - 'docs/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'LICENSE'
      - '.gitignore'
      - '.repo-health.json'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
      - name: Check cross-agent portability
        run: python3 scripts/check-portability.py
      - name: Self-test — commit trailers
        run: python3 scripts/check-commit-trailers.py --self-test
      - name: Self-test — commit body checker
        run: python3 scripts/check-commit-body.py --self-test
      - name: Self-test — doc audit
        run: python3 scripts/doc-audit.py --self-test
      - name: Self-test — verify.sh
        run: bash scripts/verify.sh --self-test
      - name: Self-test — sync-payload.sh syntax
        run: bash -n scripts/sync-payload.sh
      - name: Payload sync check
        run: bash scripts/sync-payload.sh --ci
      - name: Staged-install smoke test
        run: python3 skills/repo-health-and-sync-skill/scripts/check-portability.py
      - name: Shell script lint
        run: shellcheck scripts/*.sh 2>/dev/null || true
      - name: Python script lint
        run: python3 -m ruff check scripts/
      - name: Verify referenced URLs
        run: python3 scripts/verify-urls.py

  full-verify:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Full verification
        run: bash scripts/verify.sh

  phase-b-gate:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Phase B — Pre-release health check
        run: |
          echo "=== Phase B: Pre-release health check ==="
          python3 scripts/check-commit-body.py --range origin/main..HEAD || echo "WARNING: commit body format violations"
          python3 scripts/check-commit-trailers.py --range origin/main..HEAD || echo "WARNING: unauthorized trailers"
          git status --porcelain | read && echo "BLOCKING: dirty tree" && exit 1 || echo "PASS: clean tree"