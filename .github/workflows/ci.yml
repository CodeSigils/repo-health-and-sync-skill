name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'docs/**'
      - 'evals/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'LICENSE'
      - '.gitignore'
      - '.repo-health.json'
      - '.codex-plugin/plugin.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'docs/**'
      - 'evals/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'LICENSE'
      - '.gitignore'
      - '.repo-health.json'
      - '.codex-plugin/plugin.json'
      - '.github/workflows/ci.yml'
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
      - name: Check cross-agent portability
        run: python3 scripts/check-portability.py
      - name: Self-test — doc audit
        run: python3 scripts/doc-audit.py --self-test
      - name: Self-test — verify.sh
        run: bash scripts/verify.sh --self-test
      - name: Self-test — expiry checker
        run: python3 scripts/check-expiry.py --self-test
      - name: Self-test — URL verifier
        run: python3 scripts/verify-urls.py --self-test
      - name: Self-test — test extractor
        run: python3 scripts/extract-tests.py --self-test
      - name: Self-test — script validator
        run: python3 scripts/validate-scripts.py --self-test
      - name: Self-test — eval validator
        run: python3 scripts/validate-evals.py --self-test
      - name: Self-test — version consistency
        run: python3 scripts/check-version-consistency.py --self-test
      - name: Validate behavioral eval contract
        run: python3 scripts/validate-evals.py
      - name: Shell script lint
        run: shellcheck scripts/*.sh 2>/dev/null || true
      - name: Python script lint
        run: python3 -m ruff check scripts/ skills/
      - name: Version consistency check
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check-version-consistency.py --require-github-release-query

  full-verify:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Full verification
        run: bash scripts/verify.sh

  phase-b-gate:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      COMMIT_RANGE: ${{ github.event.before == '0000000000000000000000000000000000000000' && 'origin/main..HEAD' || format('{0}..{1}', github.event.before, github.event.after) }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Phase B — Pre-release health check
        run: |
          echo "=== Phase B: Pre-release health check ==="
          echo "Checking commit range: ${COMMIT_RANGE}"
          if [ -n "$(git status --porcelain)" ]; then
            echo "BLOCKING: dirty tree"
            exit 1
          fi
          echo "PASS: clean tree"

  check-expiry:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Check for expired references
        run: python3 scripts/check-expiry.py --strict

  verify-urls:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Verify referenced URLs
        run: python3 scripts/verify-urls.py
